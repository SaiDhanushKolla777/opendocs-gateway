# OpenDocs Gateway — single-GPU MI300X
# Backend + frontend; vLLM is external (set VLLM_BASE_URL to your vLLM server).

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8001/v1}
      - VLLM_MODEL=${VLLM_MODEL}
      - VLLM_API_KEY=${VLLM_API_KEY}
      - DATABASE_URL=sqlite:///./data/opendocs.db
      - UPLOAD_DIR=./data/uploads
      - DATA_DIR=./data
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-50}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_RETRIEVED_CHUNKS=${MAX_RETRIEVED_CHUNKS:-20}
      - MAX_CONTEXT_CHARS=${MAX_CONTEXT_CHARS:-32000}
      - MAX_ANSWER_TOKENS=${MAX_ANSWER_TOKENS:-1024}
      - FAISS_ENABLED=${FAISS_ENABLED:-true}
      - FAISS_INDEX_DIR=./data/faiss_indexes
      - FAISS_USE_HNSW=${FAISS_USE_HNSW:-true}
    volumes:
      - opendocs_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${APP_PORT:-8000}
    depends_on:
      - api

volumes:
  opendocs_data:
